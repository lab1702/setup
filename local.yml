---
# Main playbook for ansible-pull
# Usage: sudo ansible-pull -U https://github.com/lab1702/setup.git

- name: Setup Ubuntu Developer Workstation
  hosts: localhost
  connection: local
  become: true

  vars:
    user_name: "{{ ansible_facts['env']['SUDO_USER'] | default(ansible_facts['user_id']) }}"

  pre_tasks:
    - name: Check for Ubuntu Desktop
      ansible.builtin.stat:
        path: /usr/bin/gnome-shell
      register: gnome_shell

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        update_cache: true
        name:
          # Build tools and utilities
          - build-essential
          - gpg
          - git
          - gh
          - cmake
          - curl
          - wget
          - unzip
          - jq
          - ripgrep
          - fd-find
          - fzf
          - tree
          - eza
          - bat
          - socat
          # Docker
          - docker.io
          - docker-buildx
          - docker-compose-v2
          # Document processing tools
          - tidy
          - pandoc
          - texlive-full
          - poppler-utils
          - tesseract-ocr
          - ocrmypdf
          - qpdf
          # Development libraries
          - libxml2-dev
          - libcurl4-openssl-dev
          - libssl-dev
          - libx11-dev
          - libglu1-mesa-dev
          - libftgl-dev
          - libfontconfig1-dev
          - libcairo2-dev
          - libgsl-dev
          - libudunits2-dev
          - libgdal-dev
          - gdal-bin
          - libmpfr-dev
          - libgmp-dev
          - libharfbuzz-dev
          - libfribidi-dev
          - libunwind-dev
          - libarchive-dev
          - libsodium-dev
          - libsecret-1-dev
          - libabsl-dev
          - libgit2-dev
          - libmagick++-dev
          - libpoppler-cpp-dev
          - libavfilter-dev
          - libnode-dev
          - libpcap-dev
          - libxrandr-dev
          - libxcursor-dev
          - libxinerama-dev
          - libxi-dev
          - libxxf86vm-dev
          - libzmq3-dev
          # Database tools
          - unixodbc-dev
          - tdsodbc
          - sqlite3
          - sqlite3-tools
          # Programming languages and runtimes
          - libopenblas-dev
          - r-base
          - r-base-dev
          - r-cran-devtools
          - r-cran-tidyverse
          - r-cran-plotly
          - r-cran-shiny
          - r-cran-rmarkdown
          - r-cran-rodbc
          - python-is-python3
          - python3-venv
          - python3-pandas
          - python3-openpyxl
          - python3-pyarrow
          - python3-xlsxwriter
          - python3-sqlalchemy
          - python3-pyodbc
          - python3-pymssql
          - python3-statsmodels
          - python3-seaborn
          - python3-plotly
          - python3-altair
          - python3-reportlab
          - jupyter
          - golang
          - rustup
          - nodejs
          - npm
          - gnucobol
          # System utilities
          - vim
          - fastfetch
          - cpufetch
          - figlet
          - dos2unix
          - htop
          - btop
          - glances
          - nvtop
          - jnettop
          - ffmpeg
          - ttyd
        state: present

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ user_name }}"
        groups: docker
        append: true

    - name: Include desktop setup
      ansible.builtin.include_tasks: desktop.yml
      when: gnome_shell.stat.exists

    - name: Download and install DuckDB CLI
      ansible.builtin.unarchive:
        src: https://github.com/duckdb/duckdb/releases/latest/download/duckdb_cli-linux-amd64.zip
        dest: /usr/local/bin
        remote_src: true
        mode: '0755'

    - name: Get latest Quarto version
      ansible.builtin.uri:
        url: https://api.github.com/repos/quarto-dev/quarto-cli/releases/latest
        return_content: true
      register: quarto_release
      check_mode: false

    - name: Install Quarto
      # ponytail: vars split out to keep the deb line under ansible-lint's length limit
      vars:
        quarto_tag: "{{ quarto_release.json.tag_name }}"
        quarto_ver: "{{ quarto_tag | regex_replace('^v', '') }}"
      ansible.builtin.apt:
        deb: "https://github.com/quarto-dev/quarto-cli/releases/download/{{ quarto_tag }}/quarto-{{ quarto_ver }}-linux-amd64.deb"
