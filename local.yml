---
# Main playbook for ansible-pull
# Usage: sudo ansible-pull -U https://github.com/lab1702/setup.git

- name: Setup Ubuntu Developer Workstation
  hosts: localhost
  connection: local
  become: true

  vars:
    user_name: "{{ ansible_facts['env']['SUDO_USER'] | default(ansible_facts['user_id']) }}"

  pre_tasks:
    - name: Check for Ubuntu Desktop
      ansible.builtin.stat:
        path: /usr/bin/gnome-shell
      register: gnome_shell

  tasks:
    - name: Include system update tasks
      ansible.builtin.include_tasks: tasks/update.yml

    - name: Include base packages installation
      ansible.builtin.include_tasks: tasks/packages.yml

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ user_name }}"
        groups: docker
        append: true

    - name: Include desktop setup
      ansible.builtin.include_tasks: tasks/desktop.yml
      when: gnome_shell.stat.exists

    - name: Download and install DuckDB CLI
      ansible.builtin.unarchive:
        src: https://github.com/duckdb/duckdb/releases/latest/download/duckdb_cli-linux-amd64.zip
        dest: /usr/local/bin
        remote_src: true
        mode: '0755'

    - name: Get latest Quarto version
      ansible.builtin.uri:
        url: https://api.github.com/repos/quarto-dev/quarto-cli/releases/latest
        return_content: true
      register: quarto_release
      check_mode: false

    - name: Install Quarto
      vars:
        quarto_tag: "{{ quarto_release.json.tag_name }}"
        quarto_ver: "{{ quarto_tag | regex_replace('^v', '') }}"
      ansible.builtin.apt:
        deb: "https://github.com/quarto-dev/quarto-cli/releases/download/{{ quarto_tag }}/quarto-{{ quarto_ver }}-linux-amd64.deb"
