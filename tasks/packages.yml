---
# Base development packages

- name: Install build tools and utilities
  ansible.builtin.apt:
    name:
      - build-essential
      - gpg
      - git
      - gh
      - cmake
      - curl
      - wget
      - unzip
      - jq
      - ripgrep
      - fd-find
      - fzf
      - tree
      - eza
      - bat
      - socat
    state: present

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-buildx
      - docker-compose-v2
    state: present

- name: Install document processing tools
  ansible.builtin.apt:
    name:
      - tidy
      - pandoc
      - texlive-full
      - poppler-utils
      - tesseract-ocr
      - ocrmypdf
      - qpdf
    state: present

- name: Install development libraries
  ansible.builtin.apt:
    name:
      - libxml2-dev
      - libcurl4-openssl-dev
      - libssl-dev
      - libx11-dev
      - libglu1-mesa-dev
      - libftgl-dev
      - libfontconfig1-dev
      - libcairo2-dev
      - libgsl-dev
      - libudunits2-dev
      - libgdal-dev
      - gdal-bin
      - libmpfr-dev
      - libgmp-dev
      - libharfbuzz-dev
      - libfribidi-dev
      - libunwind-dev
      - libarchive-dev
      - libsodium-dev
      - libsecret-1-dev
      - libabsl-dev
      - libgit2-dev
      - libmagick++-dev
      - libpoppler-cpp-dev
      - libavfilter-dev
      - libnode-dev
      - libpcap-dev
      - libxrandr-dev
      - libxcursor-dev
      - libxinerama-dev
      - libxi-dev
      - libxxf86vm-dev
      - libzmq3-dev
    state: present

- name: Install database tools
  ansible.builtin.apt:
    name:
      - unixodbc-dev
      - tdsodbc
      - sqlite3
      - sqlite3-tools
    state: present

- name: Install programming languages and runtimes
  ansible.builtin.apt:
    name:
      - libopenblas-dev
      - r-base
      - r-base-dev
      - r-cran-devtools
      - r-cran-tidyverse
      - r-cran-plotly
      - r-cran-shiny
      - r-cran-rmarkdown
      - r-cran-rodbc
      - python-is-python3
      - python3-venv
      - python3-virtualenv
      - python3-pandas
      - python3-openpyxl
      - python3-pyarrow
      - python3-xlsxwriter
      - python3-sqlalchemy
      - python3-pyodbc
      - python3-pymssql
      - python3-statsmodels
      - python3-seaborn
      - python3-plotly
      - python3-altair
      - python3-reportlab
      - jupyter
      - golang
      - rustup
      - nodejs
      - npm
      - gnucobol
    state: present

- name: Install system utilities
  ansible.builtin.apt:
    name:
      - vim
      - fastfetch
      - cpufetch
      - figlet
      - dos2unix
      - htop
      - btop
      - glances
      - nvtop
      - jnettop
      - ffmpeg
      - ttyd
    state: present
