---
# Desktop (non-WSL) specific packages

- name: Install desktop fonts and tools
  ansible.builtin.apt:
    name:
      - openssh-server
      - fonts-firacode
    state: present

- name: Install Classic Snaps
  community.general.snap:
    name:
      - code
    classic: true

- name: Install Snaps
  community.general.snap:
    name:
      - chromium
      - discord
      - steam
      - zoom-client
